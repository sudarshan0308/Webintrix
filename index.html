<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webnitrix OS - Tactical Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; user-select: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; transition: opacity 1s; }
        
        /* Tactical Layout */
        .top-nav { 
            position: absolute; top: 20px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; 
        }

        #right-panel { 
            text-align: right; border-right: 3px solid #0f0; padding-right: 15px; 
            text-shadow: 0 0 8px #0f0; width: 260px;
        }
        #right-panel h2 { margin: 5px 0; font-size: 1.1rem; }

        /* Tactical HUD Graphs */
        .stat-bar-container { width: 100%; height: 10px; background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; margin: 5px 0 12px auto; overflow: hidden; }
        .stat-fill { height: 100%; background: #0f0; width: 0%; transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .label { font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; }

        /* Bottom UI */
        #alien-label { position: absolute; bottom: 130px; left: 0; width: 100%; text-align: center; font-size: 3.5rem; font-weight: bold; opacity: 0; transition: opacity 0.5s; }
        #prompt { position: absolute; bottom: 18%; left: 0; width: 100%; text-align: center; letter-spacing: 5px; animation: breathe 2s infinite; font-weight: bold; }
        
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; z-index: 100; pointer-events: none; }

        /* Mobile Fix: Stacked but Right-Aligned */
        @media (max-width: 750px) {
            .top-nav { flex-direction: column; align-items: flex-end; gap: 20px; }
            #right-panel { border-right: none; border-left: 3px solid #0f0; padding-left: 15px; text-align: left; }
            #alien-label { font-size: 2.5rem; bottom: 150px; }
        }

        @keyframes breathe { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="ui-container">
        <div class="top-nav">
            <div class="stats">
                <h2 id="status-display">SYSTEM: STANDBY</h2>
                <p id="mode-display">MODE: IDLE</p>
            </div>

            <div id="right-panel">
                <div id="architect-view">
                    <p>PROJECT: WEBNITRIX</p>
                    <h2>ARCHITECT: SUDARSHANA MURTHY</h2>
                    <p>OS VER: 3.0.4.GOLDEN</p>
                </div>
                <div id="tactical-view" style="display: none;">
                    <p style="border-bottom: 1px solid #0f0; padding-bottom: 5px; font-size: 0.8rem;">TACTICAL DATA FEED</p>
                    <div class="label">POWER</div>
                    <div class="stat-bar-container"><div id="bar-power" class="stat-fill"></div></div>
                    <div class="label">STRIKE</div>
                    <div class="stat-bar-container"><div id="bar-fight" class="stat-fill"></div></div>
                    <div class="label">SPEED</div>
                    <div class="stat-bar-container"><div id="bar-speed" class="stat-fill"></div></div>
                    <p id="alien-class" style="font-size: 0.7rem; color: #0f0;"></p>
                </div>
            </div>
        </div>

        <div id="prompt">TAP CORE TO INITIALIZE</div>
        <div id="alien-label">HEATBLAST</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let active = false, index = 0, scrollLock = false;
        let hologram, dial, openSnd, touchStartY = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const pL = new THREE.PointLight(0xffffff, 50); pL.position.set(2, 5, 2); scene.add(pL);

        const listener = new THREE.AudioListener(); camera.add(listener);
        const loader = new THREE.AudioLoader();
        openSnd = new THREE.Audio(listener);
        loader.load('./static/sounds/opening.mp3', b => openSnd.setBuffer(b));

        const alienStats = [
            { n: "HEATBLAST",    p: 85,  f: 90,  s: 60,  c: "PYRONITE",      t: './static/models/alien1.png' },
            { n: "DIAMONDHEAD",  p: 95,  f: 85,  s: 40,  c: "PETROSAPIEN",   t: './static/models/alien2.png' },
            { n: "FOUR ARMS",    p: 100, f: 95,  s: 30,  c: "TETRAMAND",     t: './static/models/alien3.png' },
            { n: "STINKFLY",     p: 60,  f: 70,  s: 85,  c: "LEPIDOPTERRAN", t: './static/models/alien4.png' },
            { n: "GREY MATTER",  p: 15,  f: 20,  s: 70,  c: "GALVAN",        t: './static/models/alien5.png' },
            { n: "XLR8",         p: 55,  f: 65,  s: 100, c: "KINECELERAN",   t: './static/models/alien6.png' },
            { n: "WILDMUTT",     p: 75,  f: 90,  s: 85,  c: "VULPIMANCER",   t: './static/models/alien7.png' },
            { n: "UPGRADE",      p: 70,  f: 50,  s: 65,  c: "GALVANIC MECH", t: './static/models/alien8.png' },
            { n: "VERTEBRATE",   p: 65,  f: 80,  s: 90,  c: "VULPIMANCER-V", t: './static/models/alien9.png' },
            { n: "GHOSTFREAK",   p: 65,  f: 75,  s: 90,  c: "ECTONURITE",    t: './static/models/alien10.png' }
        ];

        const texLoader = new THREE.TextureLoader();
        hologram = new THREE.Sprite(new THREE.SpriteMaterial({ map: texLoader.load(alienStats[0].t), color: 0x00ff00, transparent: true, opacity: 0 }));
        hologram.scale.set(1.6, 1.6, 1); hologram.position.y = 1.8; scene.add(hologram);

        new GLTFLoader().load('./static/models/omnitrix.glb', (g) => {
            scene.add(g.scene);
            g.scene.traverse(n => { if(n.name.toLowerCase().includes("dial")) dial = n; });
            camera.position.set(0, 2, 5); camera.lookAt(0,0,0);
        });

        function updateTacticalHUD(idx) {
            const stat = alienStats[idx];
            document.getElementById('bar-power').style.width = stat.p + "%";
            document.getElementById('bar-fight').style.width = stat.f + "%";
            document.getElementById('bar-speed').style.width = stat.s + "%";
            document.getElementById('alien-class').innerText = `DNA CLASS: ${stat.c}`;
            document.getElementById('alien-label').innerText = stat.n;
        }

        function changeAlien(dir) {
            if (scrollLock) return;
            scrollLock = true;
            
            if (dir === 'next') index = (index + 1) % alienStats.length;
            else index = (index - 1 + alienStats.length) % alienStats.length;

            // Texture loading with explicit tactical update
            texLoader.load(alienStats[index].t, (tex) => {
                hologram.material.map = tex;
                updateTacticalHUD(index);
                if(dial) dial.rotation.y += (dir === 'next' ? 0.6 : -0.6);
            });

            setTimeout(() => { scrollLock = false; }, 300);
        }

        window.addEventListener('mousedown', () => {
            if (listener.context.state === 'suspended') listener.context.resume();
            if (!active) {
                active = true;
                if(openSnd.buffer) openSnd.play();
                document.getElementById('status-display').innerText = "SYSTEM: ACTIVE";
                document.getElementById('architect-view').style.display = 'none';
                document.getElementById('tactical-view').style.display = 'block';
                document.getElementById('alien-label').style.opacity = 1;
                document.getElementById('prompt').style.display = "none";
                hologram.material.opacity = 0.8;
                updateTacticalHUD(index);
            }
        });

        window.addEventListener('wheel', (e) => {
            if (active) changeAlien(e.deltaY > 0 ? 'next' : 'prev');
        });

        window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchend', (e) => {
            if (active) {
                let diff = touchStartY - e.changedTouches[0].clientY;
                if (Math.abs(diff) > 40) changeAlien(diff > 0 ? 'next' : 'prev');
            }
        }, { passive: true });

        function animate() {
            requestAnimationFrame(animate);
            if(active) hologram.position.y = 1.8 + Math.sin(Date.now()*0.003)*0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
