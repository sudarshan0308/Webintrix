<!DOCTYPE html>
<html>
<head>
    <title>Omnitrix OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        #gui { position: absolute; top: 20px; left: 20px; z-index: 10; }
        #alien-name { position: absolute; bottom: 80px; width: 100%; font-size: 3rem; text-align: center; font-weight: bold; text-shadow: 0 0 20px #0f0; }
        #start-prompt { position: absolute; bottom: 15%; width: 100%; text-align: center; letter-spacing: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>
    <div id="gui"><h1>SYSTEM: READY</h1></div>
    <div id="start-prompt">TAP CORE TO INITIALIZE</div>
    <div id="alien-name">HEATBLAST</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pLight = new THREE.PointLight(0xffffff, 50);
        pLight.position.set(2, 5, 2);
        scene.add(pLight);

        const listener = new THREE.AudioListener();
        camera.add(listener);

        const audioLoader = new THREE.AudioLoader();
        const openSound = new THREE.Audio(listener);
        // RELATIVE PATHS
        audioLoader.load('./static/sounds/opening.mp3', (buf) => openSound.setBuffer(buf));

        const textureLoader = new THREE.TextureLoader();
        const alienTex = textureLoader.load('./static/models/alien1.png');
        const spriteMat = new THREE.SpriteMaterial({ map: alienTex, color: 0x00ff00, transparent: true, opacity: 0 });
        const hologram = new THREE.Sprite(spriteMat);
        hologram.scale.set(1.5, 1.5, 1);
        hologram.position.y = 1.8;
        scene.add(hologram);

        const loader = new GLTFLoader();
        // RELATIVE PATHS
        loader.load('./static/models/omnitrix.glb', (gltf) => {
            scene.add(gltf.scene);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 0, 0);
            console.log("Omnitrix Loaded Successfully!");
        }, undefined, (err) => console.error("Error loading model:", err));

        window.addEventListener('click', () => {
            if (listener.context.state === 'suspended') listener.context.resume();
            hologram.material.opacity = 0.8;
            if (openSound.buffer) openSound.play();
            document.getElementById('start-prompt').style.display = 'none';
        });

        function animate() {
            requestAnimationFrame(animate);
            if (hologram) hologram.position.y = 1.8 + Math.sin(Date.now() * 0.003) * 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
